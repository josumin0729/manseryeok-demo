<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>만세력</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
      background: #f5f5f5;
      padding-top: 70px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
    }

    .tabs {
      display: flex;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: white;
      border-bottom: 1px solid #ddd;
      z-index: 100;
      max-width: 600px;
      margin: 0 auto;
    }

    .tab-button {
      flex: 1;
      padding: 12px;
      border: none;
      background: white;
      cursor: pointer;
      font-size: 14px;
      color: #666;
      transition: all 0.2s;
    }

    .tab-button.active {
      color: #000;
      font-weight: 600;
      border-bottom: 2px solid #000;
    }

    .tab-content {
      display: none;
      padding: 20px;
    }

    .tab-content.active {
      display: block;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .card {
      background: white;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #333;
    }

    .info-row {
      display: flex;
      padding: 8px 0;
      border-bottom: 1px solid #f5f5f5;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      width: 80px;
      color: #666;
      font-size: 14px;
    }

    .info-value {
      flex: 1;
      font-size: 14px;
      color: #000;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 12px 8px;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #f8f8f8;
      font-weight: 600;
      color: #333;
    }

    .saju-table td {
      font-size: 18px;
      font-weight: 600;
      padding: 16px 8px;
    }

    .saju-table th {
      font-size: 12px;
      color: #666;
      font-weight: 500;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 16px;
      background: white;
      border-radius: 8px;
    }

    .calendar-header button {
      padding: 8px 16px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .calendar-header button:hover {
      background: #f5f5f5;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 20px;
    }

    .calendar-day-header {
      text-align: center;
      padding: 8px;
      font-size: 12px;
      color: #666;
      font-weight: 600;
    }

    .calendar-day {
      aspect-ratio: 1;
      border: 1px solid #eee;
      border-radius: 4px;
      padding: 8px;
      cursor: pointer;
      background: white;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
    }

    .calendar-day:hover {
      background: #f5f5f5;
      border-color: #ddd;
    }

    .calendar-day.selected {
      background: #000;
      color: white;
      border-color: #000;
    }

    .calendar-day.today {
      border: 2px solid #2196F3;
    }

    .calendar-day.empty {
      background: #fafafa;
      cursor: default;
      border-color: transparent;
    }

    .calendar-day.empty:hover {
      background: #fafafa;
    }

    .day-number {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .day-ganzhi {
      font-size: 11px;
      color: #666;
    }

    .calendar-day.selected .day-ganzhi {
      color: rgba(255,255,255,0.8);
    }

    .detail-panel {
      background: white;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
    }

    .detail-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-section-title {
      font-size: 14px;
      font-weight: 600;
      color: #666;
      margin-bottom: 8px;
    }

    .detail-content {
      font-size: 14px;
      line-height: 1.6;
      color: #333;
    }

    .toggle-section {
      border: 1px solid #eee;
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .toggle-header {
      padding: 16px;
      background: #f8f8f8;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      user-select: none;
    }

    .toggle-header:hover {
      background: #f0f0f0;
    }

    .toggle-icon {
      transition: transform 0.3s;
      font-size: 12px;
    }

    .toggle-section.open .toggle-icon {
      transform: rotate(90deg);
    }

    .toggle-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .toggle-section.open .toggle-content {
      max-height: 2000px;
    }

    .toggle-body {
      padding: 16px;
    }

    .dictionary-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dictionary-item {
      border: 1px solid #eee;
      border-radius: 8px;
      overflow: hidden;
    }

    .dictionary-term {
      padding: 12px 16px;
      background: #f8f8f8;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dictionary-term:hover {
      background: #f0f0f0;
    }

    .dictionary-description {
      padding: 16px;
      line-height: 1.6;
      font-size: 14px;
      color: #333;
      display: none;
    }

    .dictionary-item.open .dictionary-description {
      display: block;
    }

    .dictionary-item.open .toggle-icon {
      transform: rotate(90deg);
    }

    @media (max-width: 600px) {
      .container {
        border-radius: 0;
      }

      .calendar-day {
        padding: 4px;
      }

      .day-number {
        font-size: 12px;
      }

      .day-ganzhi {
        font-size: 10px;
      }
    }
  </style>

  <!-- CSS 오버라이드 -->
  <style id="custom-overrides">
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",

h1, h2 {
  font-weight: 700;

}

/* 테이블 - detail-panel 내부만 적용 (사주 표에 영향 안 줌) */

}

  </style>
</head>
<body>
  <div class="container">
    <div class="tabs">
      <button class="tab-button active" data-tab="daily">일일</button>
      <button class="tab-button" data-tab="calendar">달력</button>
      <button class="tab-button" data-tab="gongbu">공부</button>
      <button class="tab-button" data-tab="myinfo">내 정보</button>
    </div>

    <!-- 일일 탭 -->
    <div class="tab-content active" id="daily">
      <h2 id="daily-title">오늘의 운세</h2>
      <div id="daily-content"></div>
    </div>

    <!-- 달력 탭 -->
    <div class="tab-content" id="calendar">
      <div class="calendar-header">
        <button id="prev-month">◀ 이전</button>
        <h2 id="current-month"></h2>
        <button id="next-month">다음 ▶</button>
      </div>
      <div class="calendar" id="calendar-grid"></div>
      <div id="calendar-detail"></div>
    </div>

    <!-- 공부 탭 -->
    <div class="tab-content" id="gongbu">
      <h2>사주 용어 사전</h2>
      <div id="dictionary-container" class="dictionary-container"></div>
    </div>

    <!-- 내 정보 탭 -->
    <div class="tab-content" id="myinfo">
      <h2>내 사주 정보</h2>
      <div id="myinfo-content"></div>
    </div>
  </div>

  <script>
    // 한국 시간대 (UTC+9) 기준 현재 날짜 가져오기
    function getKoreanDate() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const koreanTime = new Date(utc + (9 * 3600000)); // UTC+9
        return koreanTime;
    }

    // 한국 시간 자정까지 남은 시간 계산
    function getMillisecondsUntilKoreanMidnight() {
        const now = getKoreanDate();
        const midnight = new Date(now);
        midnight.setHours(24, 0, 0, 0); // 다음날 00:00:00
        return midnight - now;
    }

    // 자정에 페이지 자동 새로고침
    function scheduleKoreanMidnightRefresh() {
        const msUntilMidnight = getMillisecondsUntilKoreanMidnight();
        setTimeout(() => {
            location.reload();
        }, msUntilMidnight);
    }

    // 한자를 한글로 변환하는 함수
    function toKorean(hanja) {
        const cheonganMap = {
            '甲': '갑', '乙': '을', '丙': '병', '丁': '정', '戊': '무',
            '己': '기', '庚': '경', '辛': '신', '壬': '임', '癸': '계'
        };
        const jijiMap = {
            '子': '자', '丑': '축', '寅': '인', '卯': '묘', '辰': '진', '巳': '사',
            '午': '오', '未': '미', '申': '신', '酉': '유', '戌': '술', '亥': '해'
        };
        return cheonganMap[hanja] || jijiMap[hanja] || hanja;
    }

    let koreaData = {};
    let dictionary = {};
    let jamiData = {};
    let lifePhaseData = {};
    let sajuDetailData = {};
    let currentDate = getKoreanDate();
    let currentYear = currentDate.getFullYear();
    let currentMonth = currentDate.getMonth() + 1;
    let selectedDate = null;

    // 데이터 로드 (5개 JSON 파일)
    Promise.all([
      fetch('data/korea_data_sample.json').then(r => r.json()),
      fetch('data/dictionary_FINAL.json').then(r => r.json()),
      fetch('data/jami_data_sample.json').then(r => r.json()),
      fetch('data/life_phase_fortune_sample.json').then(r => r.json()),
      fetch('data/saju_detail_sample.json').then(r => r.json())
    ]).then(([korea, dict, jami, lifePhase, sajuDetail]) => {
      koreaData = korea;
      dictionary = dict;
      jamiData = jami;
      lifePhaseData = lifePhase;
      sajuDetailData = sajuDetail;
      
      console.log('✅ 데이터 로드 성공!');
      
      init();
      scheduleKoreanMidnightRefresh();
    }).catch(err => {
      console.error('❌ 데이터 로드 실패:', err);
      document.getElementById('daily-content').innerHTML = `
        <div class="card">
          <p>데이터를 불러오는 중 오류가 발생했습니다.</p>
          <p style="color: red; font-size: 12px;">에러: ${err.message}</p>
        </div>
      `;
    });

    function init() {
      renderDaily();
      renderCalendar(currentYear, currentMonth);
      renderGongbu();
      renderMyInfo();
      setupEventListeners();
    }

    function setupEventListeners() {
      // 탭 전환
      document.querySelectorAll('.tab-button').forEach(button => {
        button.addEventListener('click', () => {
          const tab = button.dataset.tab;
          
          document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          
          button.classList.add('active');
          document.getElementById(tab).classList.add('active');
        });
      });

      // 달력 네비게이션
      document.getElementById('prev-month').addEventListener('click', () => {
        currentMonth--;
        if (currentMonth < 1) {
          currentMonth = 12;
          currentYear--;
        }
        renderCalendar(currentYear, currentMonth);
      });

      document.getElementById('next-month').addEventListener('click', () => {
        currentMonth++;
        if (currentMonth > 12) {
          currentMonth = 1;
          currentYear++;
        }
        renderCalendar(currentYear, currentMonth);
      });
    }

    function renderDaily() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth() + 1;
      const day = currentDate.getDate();

      // 객체 키로 접근
      const dateKey = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const todayData = koreaData[dateKey];

      if (!todayData) {
        document.getElementById('daily-content').innerHTML = '<div class="card"><p>오늘의 데이터를 찾을 수 없습니다.</p></div>';
        return;
      }

      const title = `${year}년 ${month}월 ${day}일`;
      document.getElementById('daily-title').textContent = title;

      let html = `
        <div class="card">
          <div class="card-title">일진 정보</div>
          <div class="info-row">
            <div class="info-label">일진</div>
            <div class="info-value">${todayData.day_ganzhi || ''}</div>
          </div>
          <div class="info-row">
            <div class="info-label">십신</div>
            <div class="info-value">${todayData.ten_god || ''}</div>
          </div>
        </div>
      `;

      if (todayData.twelve_shinsal) {
        html += `
          <div class="card">
            <div class="card-title">12신살</div>
            <div class="info-row">
              <div class="info-label">유형</div>
              <div class="info-value">${todayData.twelve_shinsal}</div>
            </div>
            <div class="info-row">
              <div class="info-label">설명</div>
              <div class="info-value">${todayData.twelve_shinsal_plain || ''}</div>
            </div>
          </div>
        `;
      }

      if (todayData.twelve_woonsung) {
        html += `
          <div class="card">
            <div class="card-title">12운성</div>
            <div class="info-row">
              <div class="info-label">운성</div>
              <div class="info-value">${todayData.twelve_woonsung}</div>
            </div>
            <div class="info-row">
              <div class="info-label">설명</div>
              <div class="info-value">${todayData.twelve_woonsung_plain || ''}</div>
            </div>
          </div>
        `;
      }

      if (todayData.constellation_28) {
        html += `
          <div class="card">
            <div class="card-title">28수</div>
            <div class="info-row">
              <div class="info-label">별자리</div>
              <div class="info-value">${todayData.constellation_28}</div>
            </div>
            <div class="info-row">
              <div class="info-label">설명</div>
              <div class="info-value">${todayData.constellation_28_plain || ''}</div>
            </div>
          </div>
        `;
      }

      if (todayData.theme) {
        html += `
          <div class="card">
            <div class="card-title">오늘의 주제</div>
            <div class="info-row">
              <div class="info-label">주제</div>
              <div class="info-value">${todayData.theme}</div>
            </div>
          </div>
        `;
      }

      if (todayData.advice) {
        html += `
          <div class="card">
            <div class="card-title">조언</div>
            <div class="info-row">
              <div class="info-label">조언</div>
              <div class="info-value">${todayData.advice}</div>
            </div>
          </div>
        `;
      }

      if (todayData.message) {
        html += `
          <div class="card">
            <div class="card-title">메시지</div>
            <div class="info-row">
              <div class="info-label">메시지</div>
              <div class="info-value">${todayData.message}</div>
            </div>
          </div>
        `;
      }

      document.getElementById('daily-content').innerHTML = html;
    }

    function renderCalendar(year, month) {
      document.getElementById('current-month').textContent = `${year}년 ${month}월`;
      
      const firstDay = new Date(year, month - 1, 1).getDay();
      const lastDate = new Date(year, month, 0).getDate();
      
      let html = '';
      
      // 요일 헤더
      ['일', '월', '화', '수', '목', '금', '토'].forEach(day => {
        html += `<div class="calendar-day-header">${day}</div>`;
      });
      
      // 빈 칸
      for (let i = 0; i < firstDay; i++) {
        html += '<div class="calendar-day empty"></div>';
      }
      
      // 날짜
      for (let day = 1; day <= lastDate; day++) {
        // 객체 키로 접근
        const dateKey = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dateData = koreaData[dateKey];
        
        const isToday = year === currentDate.getFullYear() && 
                       month === (currentDate.getMonth() + 1) && 
                       day === currentDate.getDate();
        
        const isSelected = selectedDate && 
                          selectedDate.year === year && 
                          selectedDate.month === month && 
                          selectedDate.day === day;
        
        const classes = ['calendar-day'];
        if (isToday) classes.push('today');
        if (isSelected) classes.push('selected');
        
        const ganzhi = dateData ? dateData.day_ganzhi : '';
        
        html += `
          <div class="${classes.join(' ')}" data-year="${year}" data-month="${month}" data-day="${day}">
            <div class="day-number">${day}</div>
            <div class="day-ganzhi">${ganzhi}</div>
          </div>
        `;
      }
      
      document.getElementById('calendar-grid').innerHTML = html;
      
      // 날짜 클릭 이벤트
      document.querySelectorAll('.calendar-day:not(.empty)').forEach(dayEl => {
        dayEl.addEventListener('click', function() {
          const year = parseInt(this.dataset.year);
          const month = parseInt(this.dataset.month);
          const day = parseInt(this.dataset.day);
          
          selectedDate = { year, month, day };
          renderCalendar(year, month);
          renderCalendarDetail(year, month, day);
        });
      });
    }

    function renderCalendarDetail(year, month, day) {
      // 객체 키로 접근
      const dateKey = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const dateData = koreaData[dateKey];

      if (!dateData) {
        document.getElementById('calendar-detail').innerHTML = '<div class="card"><p>해당 날짜의 데이터가 없습니다.</p></div>';
        return;
      }

      let html = `
        <div class="detail-panel">
          <div class="detail-title">${year}년 ${month}월 ${day}일</div>
          
          <div class="detail-section">
            <div class="detail-section-title">기본 정보</div>
            <div class="detail-content">
              <div class="info-row">
                <div class="info-label">일진</div>
                <div class="info-value">${dateData.day_ganzhi || ''}</div>
              </div>
              <div class="info-row">
                <div class="info-label">십신</div>
                <div class="info-value">${dateData.ten_god || ''}</div>
              </div>
            </div>
          </div>
      `;

      if (dateData.twelve_shinsal) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">12신살</div>
            <div class="detail-content">
              <strong>${dateData.twelve_shinsal}</strong><br>
              ${dateData.twelve_shinsal_plain || ''}
            </div>
          </div>
        `;
      }

      if (dateData.twelve_woonsung) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">12운성</div>
            <div class="detail-content">
              <strong>${dateData.twelve_woonsung}</strong><br>
              ${dateData.twelve_woonsung_plain || ''}
            </div>
          </div>
        `;
      }

      if (dateData.constellation_28) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">28수</div>
            <div class="detail-content">
              <strong>${dateData.constellation_28}</strong><br>
              ${dateData.constellation_28_plain || ''}
            </div>
          </div>
        `;
      }

      if (dateData.theme) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">오늘의 주제</div>
            <div class="detail-content">${dateData.theme}</div>
          </div>
        `;
      }

      if (dateData.advice) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">조언</div>
            <div class="detail-content">${dateData.advice}</div>
          </div>
        `;
      }

      if (dateData.message) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">메시지</div>
            <div class="detail-content">${dateData.message}</div>
          </div>
        `;
      }

      html += '</div>';
      document.getElementById('calendar-detail').innerHTML = html;
    }

    function renderGongbu() {
      let html = '';
      
      Object.entries(dictionary).forEach(([key, value]) => {
        html += `
          <div class="dictionary-item">
            <div class="dictionary-term">
              ${key}
              <span class="toggle-icon">▶</span>
            </div>
            <div class="dictionary-description">${value}</div>
          </div>
        `;
      });
      
      document.getElementById('dictionary-container').innerHTML = html;
      
      // 토글 기능
      document.querySelectorAll('.dictionary-term').forEach(term => {
        term.addEventListener('click', function() {
          this.parentElement.classList.toggle('open');
        });
      });
    }

    function renderMyInfo() {
      const sajuData = sajuDetailData || {};
      
      let html = '<div class="card"><div class="card-title">사주</div>';
      
      // 사주 테이블 (천간/지지만)
      if (sajuData.si_cheongan) {
        const cheongan = `<td>${toKorean(sajuData.si_cheongan || '')}</td><td>${toKorean(sajuData.il_cheongan || '')}</td><td>${toKorean(sajuData.wol_cheongan || '')}</td><td>${toKorean(sajuData.nyeon_cheongan || '')}</td>`;
        const jiji = `<td>${toKorean(sajuData.si_jiji || '')}</td><td>${toKorean(sajuData.il_jiji || '')}</td><td>${toKorean(sajuData.wol_jiji || '')}</td><td>${toKorean(sajuData.nyeon_jiji || '')}</td>`;
        
        const sajuTableHTML = `
          <table class="saju-table">
            <tr>
              <th></th>
              <th>초년운<br><small>조상, 시대상</small></th>
              <th>청년운<br><small>부모, 사회성</small></th>
              <th>중년운<br><small>정체성, 자아</small></th>
              <th>말년운<br><small>자녀, 결실</small></th>
            </tr>
            <tr>
              <th></th>
              <th>년주</th>
              <th>월주</th>
              <th>일주</th>
              <th>시주</th>
            </tr>
            <tr>
              <th>천간</th>
              ${cheongan}
            </tr>
            <tr>
              <th>지지</th>
              ${jiji}
            </tr>
          </table>
        `;
        
        html += sajuTableHTML;
      }
      
      html += '</div>';
      
      // 상세 설명 (토글)
      html += renderShinsal(sajuDetailData);
      html += renderJami(jamiData);
      html += renderLifePhase(lifePhaseData);
      
      document.getElementById('myinfo-content').innerHTML = html;
      
      // 토글 기능
      document.querySelectorAll('.toggle-header').forEach(header => {
        header.addEventListener('click', function() {
          this.parentElement.classList.toggle('open');
        });
      });
    }

    function renderShinsal(sajuData) {
      sajuData = sajuData || {};
      
      let html = `
        <div class="toggle-section">
          <div class="toggle-header">
            상세 설명
            <span class="toggle-icon">▶</span>
          </div>
          <div class="toggle-content">
            <div class="toggle-body">
      `;
      
      // 일간
      if (sajuData.ilgan) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">일간: ${toKorean(sajuData.ilgan)}</div>
            <div class="detail-content">${sajuData.ilgan_desc || ''}</div>
          </div>
        `;
      }
      
      // 년주
      if (sajuData.nyeon_cheongan && sajuData.nyeon_jiji) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">년주 (${toKorean(sajuData.nyeon_cheongan)}${toKorean(sajuData.nyeon_jiji)}) - 조상, 유년기, 태외적 환경</div>
            <div class="detail-content">
              천간: ${toKorean(sajuData.nyeon_cheongan)} - ${sajuData.nyeon_cheongan_desc || ''}<br>
              지지: ${toKorean(sajuData.nyeon_jiji)} - ${sajuData.nyeon_jiji_desc || ''}<br>
              지장간: ${sajuData.nyeon_jijanggan || ''}<br>
              12운성: ${sajuData.nyeon_woonsung || ''}<br>
              12신살: ${sajuData.nyeon_shinsal || ''}
            </div>
          </div>
        `;
      }
      
      // 월주
      if (sajuData.wol_cheongan && sajuData.wol_jiji) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">월주 (${toKorean(sajuData.wol_cheongan)}${toKorean(sajuData.wol_jiji)}) - 부모, 사회적 위치, 청년기</div>
            <div class="detail-content">
              천간: ${toKorean(sajuData.wol_cheongan)} - ${sajuData.wol_cheongan_desc || ''}<br>
              지지: ${toKorean(sajuData.wol_jiji)} - ${sajuData.wol_jiji_desc || ''}<br>
              지장간: ${sajuData.wol_jijanggan || ''}<br>
              12운성: ${sajuData.wol_woonsung || ''}<br>
              12신살: ${sajuData.wol_shinsal || ''}
            </div>
          </div>
        `;
      }
      
      // 일주
      if (sajuData.il_cheongan && sajuData.il_jiji) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">일주 (${toKorean(sajuData.il_cheongan)}${toKorean(sajuData.il_jiji)}) - 본인, 배우자, 중년기</div>
            <div class="detail-content">
              천간: ${toKorean(sajuData.il_cheongan)} - ${sajuData.il_cheongan_desc || ''}<br>
              지지: ${toKorean(sajuData.il_jiji)} - ${sajuData.il_jiji_desc || ''}<br>
              지장간: ${sajuData.il_jijanggan || ''}<br>
              12운성: ${sajuData.il_woonsung || ''}<br>
              12신살: ${sajuData.il_shinsal || ''}
            </div>
          </div>
        `;
      }
      
      // 시주
      if (sajuData.si_cheongan && sajuData.si_jiji) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">시주 (${toKorean(sajuData.si_cheongan)}${toKorean(sajuData.si_jiji)}) - 자녀, 말년, 결실</div>
            <div class="detail-content">
              천간: ${toKorean(sajuData.si_cheongan)} - ${sajuData.si_cheongan_desc || ''}<br>
              지지: ${toKorean(sajuData.si_jiji)} - ${sajuData.si_jiji_desc || ''}<br>
              지장간: ${sajuData.si_jijanggan || ''}<br>
              12운성: ${sajuData.si_woonsung || ''}<br>
              12신살: ${sajuData.si_shinsal || ''}
            </div>
          </div>
        `;
      }
      
      html += `
            </div>
          </div>
        </div>
      `;
      
      return html;
    }

    function renderJami(jami) {
      jami = jami || {};
      
      if (!jami.main_star) return '';
      
      let html = `
        <div class="toggle-section">
          <div class="toggle-header">
            자미두수
            <span class="toggle-icon">▶</span>
          </div>
          <div class="toggle-content">
            <div class="toggle-body">
              <div class="detail-section">
                <div class="detail-section-title">명궁 주성: ${jami.main_star || ''}</div>
                <div class="detail-content">${jami.main_star_desc || ''}</div>
              </div>
      `;
      
      if (jami.body_palace) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">신궁: ${jami.body_palace || ''}</div>
            <div class="detail-content">${jami.body_palace_desc || ''}</div>
          </div>
        `;
      }
      
      html += `
            </div>
          </div>
        </div>
      `;
      
      return html;
    }

    function renderLifePhase(lifePhase) {
      lifePhase = lifePhase || {};
      
      if (!lifePhase.chonyean && !lifePhase.chungyeon && !lifePhase.mallyeon) return '';
      
      let html = `
        <div class="toggle-section">
          <div class="toggle-header">
            인생 단계별 운세
            <span class="toggle-icon">▶</span>
          </div>
          <div class="toggle-content">
            <div class="toggle-body">
      `;
      
      const phases = [
        { key: 'chonyean', title: '초년 (1-30세)' },
        { key: 'chungyeon', title: '중년 (31-60세)' },
        { key: 'mallyeon', title: '말년 (61-90세)' }
      ];
      
      phases.forEach(phase => {
        if (lifePhase[phase.key]) {
          html += `
            <div class="detail-section">
              <div class="detail-section-title">${phase.title}</div>
              <div class="detail-content">${lifePhase[phase.key]}</div>
            </div>
          `;
        }
      });
      
      if (lifePhase.daewoon) {
        html += `
          <div class="detail-section">
            <div class="detail-section-title">대운</div>
            <div class="detail-content">${lifePhase.daewoon}</div>
          </div>
        `;
      }
      
      html += `
            </div>
          </div>
        </div>
      `;
      
      return html;
    }
  </script>
</body>
</html>
